<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Projection Capital — Connexion</title>
  <style>
    body {
      background: #0e0e0e;
      color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .msg {
      text-align: center;
      font-size: 1.1rem;
      opacity: 0.8;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #333;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="msg">
    <div class="spinner"></div>
    Connexion en cours...
  </div>
  <script>
    (function() {
      // Lire le fragment (#access_token=xxx&...)
      var hash = window.location.hash.substring(1);
      var hashParams = new URLSearchParams(hash);
      var accessToken = hashParams.get('access_token');

      // Lire les query params (?retraite_session_id=xxx)
      var searchParams = new URLSearchParams(window.location.search);
      var sessionId = searchParams.get('retraite_session_id');

      if (accessToken) {
        // Construire l'URL Streamlit avec tous les paramètres en query params
        var target = 'https://app.projectioncapital.ca';
        var params = new URLSearchParams();
        params.set('access_token', accessToken);
        if (sessionId) params.set('retraite_session_id', sessionId);

        var tokenType = hashParams.get('token_type');
        if (tokenType) params.set('token_type', tokenType);

        window.location.replace(target + '?' + params.toString());
      } else {
        // Pas de token — retourner à l'app
        window.location.replace('https://app.projectioncapital.ca');
      }
    })();
  </script>
</body>
</html>
